<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Fallback for browsers that still read meta permissions -->
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), geolocation=(self)">
    <meta name="theme-color" content="#0B0F19">
    <title>PharmaField · NEXUS Agent</title>
    
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Config loaded BEFORE app logic -->
    <script src="config.js"></script>
</head>
<body>
    <div class="nexus-header">
        <div class="brand-title">PHARMAFIELD</div>
        <div class="agent-badge" id="agentDisplay">INITIALIZING...</div>
    </div>

    <div class="main-content">
        <div class="nexus-card">
            <div class="card-title"><div class="icon icon-geo">📍</div>Site Verification</div>
            <button class="nexus-btn btn-primary" id="gpsBtn" onclick="captureGPS()">
                <span id="gpsBtnText">Lock Current Location</span>
            </button>
            <div id="gpsStatus" class="status-text">Waiting for satellite lock...</div>
            <div id="map"></div>
        </div>

        <div class="nexus-card">
            <div class="card-title"><div class="icon icon-cam">📷</div>Site Photo Proof</div>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handlePhoto(this)">
            <button class="nexus-btn btn-ghost" onclick="document.getElementById('cameraInput').click()">Open Camera</button>
            <div id="photoPreview"></div>
        </div>

        <div class="nexus-card">
            <div class="card-title"><div class="icon icon-mic">🎙️</div>Client Summary</div>
            <input type="file" id="micInput" accept="audio/*" capture="microphone" style="display: none;" onchange="handleAudio(this)">
            <button class="nexus-btn btn-ghost" onclick="document.getElementById('micInput').click()">Record Audio</button>
            <div id="audioStatus" class="status-text">No audio recorded.</div>
            <audio id="audioPlayback" controls style="display:none;"></audio>
        </div>

        <div class="console-log" id="consoleLog">
            <div class="log-entry info">[SYS] Booting NEXUS OS...</div>
        </div>
    </div>

    <div class="submit-bar">
        <button class="nexus-btn btn-submit" id="submitBtn" onclick="submitCheckIn()">🚀 SUBMIT TO HQ</button>
    </div>

    <script src="agent.js"></script>
</body>
</html>
