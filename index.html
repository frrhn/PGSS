<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*, geolocation=*">
    <meta name="theme-color" content="#0B0F19">
    <title>PharmaField · NEXUS Agent</title>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =========================================
           NEXUS DESIGN SYSTEM (2026 EDITION)
           ========================================= */
        :root {
            --bg-base: #0B0F19;
            --bg-surface: #111827;
            --bg-glass: rgba(30, 41, 59, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            
            --accent-cyan: #00E5FF;
            --accent-green: #10B981;
            --accent-amber: #F59E0B;
            --accent-red: #EF4444;
            
            --shadow-glow: 0 0 20px rgba(0, 229, 255, 0.15);
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-bottom: 100px; /* Space for sticky submit button */
            overflow-x: hidden;
        }

        /* Glassmorphism Card */
        .nexus-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }
        .nexus-card:nth-child(1) { animation-delay: 0.1s; }
        .nexus-card:nth-child(2) { animation-delay: 0.2s; }
        .nexus-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Header */
        .nexus-header {
            padding: 24px 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-cyan), #38BDF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .agent-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--accent-cyan);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Typography & Elements */
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }
        .card-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .icon-geo { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .icon-cam { background: rgba(0, 229, 255, 0.15); color: var(--accent-cyan); }
        .icon-mic { background: rgba(245, 158, 11, 0.15); color: var(--accent-amber); }

        .status-text { font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px; }
        .status-text.success { color: var(--accent-green); font-weight: 600; }

        /* Buttons */
        .nexus-btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .nexus-btn:active { transform: scale(0.98); }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), #0284c7);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }

        /* Map Container */
        #map { 
            height: 180px; 
            border-radius: var(--radius-md); 
            margin-top: 12px; 
            display: none; 
            border: 1px solid var(--border-glass);
            overflow: hidden;
        }

        /* Media Previews */
        .media-preview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-top: 12px;
            border: 1px solid var(--border-glass);
        }
        audio { width: 100%; margin-top: 12px; filter: invert(1) hue-rotate(180deg); } /* Invert audio player for dark mode */

        /* Sticky Submit Bar */
        .submit-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            z-index: 1000;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: #fff;
            font-size: 1.1rem;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-submit:disabled {
            background: #334155;
            color: #64748B;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Console Log (Tactical Style) */
        .console-log {
            background: #000000;
            border: 1px solid #1e293b;
            border-radius: var(--radius-md);
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 16px;
            color: #94A3B8;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111827; padding-bottom: 4px; }
        .log-entry.error { color: var(--accent-red); }
        .log-entry.success { color: var(--accent-green); }
        .log-entry.info { color: var(--accent-cyan); }

        /* Pulse Animation for GPS */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .pulse-dot {
            width: 10px; height: 10px; background: var(--accent-green); border-radius: 50%;
            position: relative; display: inline-block; margin-right: 8px;
        }
        .pulse-dot::before {
            content: ''; position: absolute; width: 100%; height: 100%; 
            border-radius: 50%; background: var(--accent-green);
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="nexus-header">
        <div class="brand-title">PHARMAFIELD</div>
        <div class="agent-badge" id="agentDisplay">AGENT #...</div>
    </div>

    <div style="padding: 0 16px;">
        
        <!-- 1. GPS CARD -->
        <div class="nexus-card">
            <div class="card-title">
                <div class="icon icon-geo">📍</div>
                Site Verification (GPS)
            </div>
            <button class="nexus-btn btn-primary" onclick="captureGPS()">
                <span id="gpsBtnText">Lock Current Location</span>
            </button>
            <div id="gpsStatus" class="status-text">Waiting for satellite lock...</div>
            <div id="map"></div>
        </div>

        <!-- 2. CAMERA CARD -->
        <div class="nexus-card">
            <div class="card-title">
                <div class="icon icon-cam">📷</div>
                Site Photo Proof
            </div>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handlePhoto(this)">
            <button class="nexus-btn btn-ghost" onclick="document.getElementById('cameraInput').click()">
                Open Camera / Select Photo
            </button>
            <div id="photoPreview"></div>
        </div>

        <!-- 3. AUDIO CARD -->
        <div class="nexus-card">
            <div class="card-title">
                <div class="icon icon-mic">🎙️</div>
                Client Conversation Summary
            </div>
            <input type="file" id="micInput" accept="audio/*" capture="microphone" style="display: none;" onchange="handleAudio(this)">
            <button class="nexus-btn btn-ghost" onclick="document.getElementById('micInput').click()">
                Record Native Audio
            </button>
            <div id="audioStatus" class="status-text">No audio recorded.</div>
            <audio id="audioPlayback" controls style="display:none;"></audio>
        </div>

        <!-- CONSOLE LOG -->
        <div class="console-log" id="consoleLog">
            <div class="log-entry info">[SYS] NEXUS OS Initialized. Awaiting input...</div>
        </div>

    </div>

    <!-- STICKY SUBMIT BAR -->
    <div class="submit-bar">
        <button class="nexus-btn btn-submit" id="submitBtn" onclick="submitCheckIn()">
            🚀 SUBMIT TO HQ
        </button>
    </div>

    <script>
        // ==========================================
        // NEXUS CORE LOGIC (ENTERPRISE GRADE)
        // ==========================================
        const SUPABASE_URL = 'https://sxpvroftqiglonpmghjp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_922ZnL9I7l_-pkktN19CGw_5V-HlrgY'; // YOUR KEY HERE
        const AGENT_ID = '8842';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        document.getElementById('agentDisplay').textContent = `AGENT #${AGENT_ID}`;

        let currentLat = null, currentLng = null;
        let map = null, marker = null;
        let photoFile = null, audioFile = null;
        let isSubmitting = false;
        let photoPreviewUrl = null, audioPreviewUrl = null;

        window.addEventListener('beforeunload', () => {
            if (photoPreviewUrl) URL.revokeObjectURL(photoPreviewUrl);
            if (audioPreviewUrl) URL.revokeObjectURL(audioPreviewUrl);
        });

        function log(msg, type = 'info') {
            const consoleEl = document.getElementById('consoleLog');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = `[${time}] ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function validateFile(file, allowedTypes, maxSizeMB) {
            if (!file) return { valid: false, error: "No file provided." };
            if (!allowedTypes.includes(file.type)) return { valid: false, error: `Invalid file type: ${file.type}.` };
            if (file.size > maxSizeMB * 1024 * 1024) return { valid: false, error: `File too large: ${(file.size / 1024 / 1024).toFixed(2)}MB.` };
            return { valid: true };
        }

        function captureGPS() {
            const btnText = document.getElementById('gpsBtnText');
            btnText.innerHTML = '<span class="pulse-dot"></span> Acquiring Signal...';
            log("Requesting high-accuracy GPS...", "info");
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;
                    
                    document.getElementById('gpsStatus').innerHTML = `<span class="pulse-dot"></span> Locked: ${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
                    document.getElementById('gpsStatus').className = "status-text success";
                    btnText.textContent = '✅ Location Locked';
                    log(`SUCCESS: Location captured`, "success");
                    
                    const mapEl = document.getElementById('map');
                    mapEl.style.display = 'block';
                    
                    if (!map) {
                        map = L.map('map', { zoomControl: false }).setView([currentLat, currentLng], 16);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { // Dark mode map tiles!
                            attribution: '&copy; CartoDB'
                        }).addTo(map);
                    } else {
                        map.setView([currentLat, currentLng], 16);
                    }
                    if (marker) map.removeLayer(marker);
                    
                    // Custom glowing marker
                    const glowIcon = L.divIcon({
                        className: 'custom-glow-marker',
                        html: `<div style="width: 20px; height: 20px; background: #00E5FF; border-radius: 50%; box-shadow: 0 0 15px #00E5FF, 0 0 30px #00E5FF;"></div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });
                    marker = L.marker([currentLat, currentLng], { icon: glowIcon }).addTo(map);
                },
                (error) => {
                    log(`GPS ERROR: ${error.message}`, "error");
                    btnText.textContent = 'Lock Current Location';
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        function handlePhoto(input) {
            if (input.files && input.files[0]) {
                const validation = validateFile(input.files[0], ['image/jpeg', 'image/png', 'image/webp'], 5);
                if (!validation.valid) { log(`Photo rejected: ${validation.error}`, "error"); alert(validation.error); input.value = ''; return; }
                
                photoFile = input.files[0];
                log(`SUCCESS: Photo validated (${(photoFile.size/1024).toFixed(1)} KB)`, "success");
                
                if (photoPreviewUrl) URL.revokeObjectURL(photoPreviewUrl);
                photoPreviewUrl = URL.createObjectURL(photoFile);
                document.getElementById('photoPreview').innerHTML = `<img src="${photoPreviewUrl}" class="media-preview">`;
            }
        }

        function handleAudio(input) {
            if (input.files && input.files[0]) {
                const validation = validateFile(input.files[0], ['audio/webm', 'audio/mp4', 'audio/mpeg', 'audio/wav'], 5);
                if (!validation.valid) { log(`Audio rejected: ${validation.error}`, "error"); alert(validation.error); input.value = ''; return; }
                
                audioFile = input.files[0];
                log(`SUCCESS: Audio validated`, "success");
                
                if (audioPreviewUrl) URL.revokeObjectURL(audioPreviewUrl);
                audioPreviewUrl = URL.createObjectURL(audioFile);
                
                const playback = document.getElementById('audioPlayback');
                playback.src = audioPreviewUrl;
                playback.style.display = 'block';
                document.getElementById('audioStatus').innerHTML = `✅ Audio recorded successfully.`;
                document.getElementById('audioStatus').className = "status-text success";
            }
        }

        async function submitCheckIn() {
            if (isSubmitting) return;
            if (currentLat == null || currentLng == null) { alert("⚠️ Please lock your GPS location first."); return; }
            if (!photoFile) { alert("⚠️ Please capture a site photo."); return; }

            isSubmitting = true;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="pulse-dot"></span> TRANSMITTING TO HQ...';
            log("Starting secure uplink...", "info");

            try {
                const timestamp = new Date().toISOString();
                const photoPath = `agents/${AGENT_ID}/photos/${Date.now()}.jpg`;
                const audioPath = audioFile ? `agents/${AGENT_ID}/audio/${Date.now()}.webm` : null;

                const withTimeout = (promise, ms) => Promise.race([promise, new Promise((_, reject) => setTimeout(() => reject(new Error('Network timeout')), ms))]);

                log("Uplinking photo...", "info");
                const { error: photoError } = await withTimeout(supabaseClient.storage.from('proofs').upload(photoPath, photoFile, { upsert: false }), 15000);
                if (photoError) throw new Error(`Photo uplink failed: ${photoError.message}`);
                log("✅ Photo secured", "success");

                if (audioFile) {
                    log("Uplinking audio...", "info");
                    const { error: audioError } = await withTimeout(supabaseClient.storage.from('proofs').upload(audioPath, audioFile, { upsert: false }), 15000);
                    if (audioError) throw new Error(`Audio uplink failed: ${audioError.message}`);
                    log("✅ Audio secured", "success");
                }

                log("Writing to central database...", "info");
                const { error: dbError } = await withTimeout(supabaseClient.from('checkins').insert({
                    agent_id: AGENT_ID, timestamp: timestamp, latitude: currentLat, longitude: currentLng, photo_url: photoPath, audio_url: audioPath
                }), 10000);
                
                if (dbError) throw new Error(`Database write failed: ${dbError.message}`);
                
                log("✅ TRANSMISSION COMPLETE. DATA SECURED.", "success");
                alert("✅ SUCCESS! Check-in transmitted to HQ.");
                btn.innerHTML = '✅ TRANSMITTED';

            } catch (error) {
                log(`❌ CRITICAL ERROR: ${error.message}`, "error");
                alert(`Transmission Failed: ${error.message}`);
                btn.innerHTML = '🚀 RETRY SUBMISSION';
                btn.disabled = false;
            } finally {
                isSubmitting = false;
            }
        }
    </script>
</body>
</html>
