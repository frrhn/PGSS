<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0B0F19">
    <title>PharmaField · NEXUS Command</title>
    
    <!-- External Design System -->
    <link rel="stylesheet" href="manager.css">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="command-header">
        <div class="header-left">
            <h1 class="brand-title">NEXUS COMMAND</h1>
            <span class="live-indicator"><span class="live-dot"></span> LIVE MONITORING</span>
        </div>
        <button class="nexus-btn btn-ghost btn-refresh" onclick="loadData()">
            <span id="refreshIcon">🔄</span> Sync Data
        </button>
    </header>

    <main class="command-center">
        
        <!-- STATS ROW -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon bg-cyan">📊</div>
                <div class="stat-info">
                    <span class="stat-value" id="totalCheckins">0</span>
                    <span class="stat-label">Total Check-Ins</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-green">👥</div>
                <div class="stat-info">
                    <span class="stat-value" id="uniqueAgents">0</span>
                    <span class="stat-label">Active Agents</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-amber">⏱️</div>
                <div class="stat-info">
                    <span class="stat-value" id="todayCheckins">0</span>
                    <span class="stat-label">Today's Activity</span>
                </div>
            </div>
        </section>

        <!-- TACTICAL MAP -->
        <section class="glass-panel map-panel">
            <h2 class="panel-title">🌐 Geospatial Tracking</h2>
            <div id="commandMap"></div>
        </section>

        <!-- DATA TABLE -->
        <section class="glass-panel table-panel">
            <h2 class="panel-title">📋 Field Activity Log</h2>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Agent</th>
                            <th>Timestamp</th>
                            <th>Coordinates</th>
                            <th>Photo Proof</th>
                            <th>Audio Proof</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <!-- Skeleton loaders will be injected here by JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- IMAGE MODAL -->
    <div class="modal-overlay" id="imageModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img id="modalImage" src="" alt="Full Size Proof">
        </div>
    </div>

    <!-- External Logic -->
    <script src="manager.js"></script>
</body>
</html>
