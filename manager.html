<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaField · Manager Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: 'Segoe UI', system-ui, sans-serif; }
        .dashboard-header { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 1.5rem 0; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #1a2a6c; }
        .stat-label { color: #64748b; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        #map { height: 400px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .table-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0; cursor: pointer; transition: transform 0.2s; }
        .thumb-img:hover { transform: scale(1.1); border-color: #1a2a6c; }
        audio { height: 35px; max-width: 200px; }
        .loading-spinner { text-align: center; padding: 3rem; color: #64748b; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="dashboard-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-0"><i class="bi bi-speedometer2"></i> PharmaField Manager Dashboard</h2>
                <p class="mb-0 opacity-75">Real-time Field Agent Monitoring & Proof of Work</p>
            </div>
            <button class="btn btn-outline-light" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Refresh Data</button>
        </div>
    </div>

    <div class="container">
        <!-- ON-SCREEN DEBUGGER -->
        <div class="alert alert-light border shadow-sm mb-4" id="debugStatus">
            <i class="bi bi-bug"></i> <strong>System Status:</strong> Initializing...
        </div>

        <!-- Stats Row -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="stat-card">
                    <div class="stat-value" id="totalCheckins">0</div>
                    <div class="stat-label">Total Check-Ins</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="stat-card">
                    <div class="stat-value" id="uniqueAgents">0</div>
                    <div class="stat-label">Active Agents</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="stat-card">
                    <div class="stat-value" id="todayCheckins">0</div>
                    <div class="stat-label">Today's Check-Ins</div>
                </div>
            </div>
        </div>

        <!-- Live Map -->
        <div id="map"></div>

        <!-- Data Table -->
        <div class="table-card p-3 p-md-4">
            <h5 class="mb-3"><i class="bi bi-table"></i> Recent Field Activity</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Agent ID</th>
                            <th>Timestamp</th>
                            <th>Location</th>
                            <th>Photo Proof</th>
                            <th>Audio Proof</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="checkinTableBody">
                        <tr><td colspan="6" class="loading-spinner"><div class="spinner-border text-primary"></div><br>Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Image Enlarge Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Site Photo Proof</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-0">
                    <img id="modalImage" src="" class="img-fluid" alt="Site Photo">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const SUPABASE_URL = 'https://sxpvroftqiglonpmghjp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_922ZnL9I7l_-pkktN19CGw_5V-HlrgY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let map;
        let markers = [];

        function updateStatus(msg, isError = false) {
            const el = document.getElementById('debugStatus');
            if(el) {
                el.innerHTML = `<i class="bi bi-${isError ? 'exclamation-triangle-fill text-danger' : 'check-circle-fill text-success'}"></i> <strong>Status:</strong> ${msg}`;
                el.className = `alert ${isError ? 'alert-danger' : 'alert-light border'} shadow-sm mb-4`;
            }
        }

        // ==========================================
        // 2. INITIALIZATION
        // ==========================================
        window.onload = function() {
            initMap();
            loadData();
        };

        function initMap() {
            map = L.map('map').setView([32.0724, 72.6823], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        }

        // ==========================================
        // 3. DATA FETCHING & RENDERING
        // ==========================================
        async function loadData() {
            updateStatus("Connecting to database...");
            const tbody = document.getElementById('checkinTableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading-spinner"><div class="spinner-border text-primary"></div><br>Loading data...</td></tr>';

            markers.forEach(m => map.removeLayer(m));
            markers = [];

            try {
                updateStatus("Fetching records from 'checkins' table...");
                const { data, error } = await supabase
                    .from('checkins')
                    .select('*')
                    .order('timestamp', { ascending: false });

                if (error) {
                    updateStatus("Database Error: " + error.message, true);
                    throw error;
                }

                if (!data || data.length === 0) {
                    updateStatus("Connected successfully, but the table is empty.", true);
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No check-ins found yet.</td></tr>';
                    updateStats([]);
                    return;
                }

                updateStatus(`Success! Found ${data.length} record(s). Rendering dashboard...`);
                updateStats(data);
                renderTable(data);
                renderMap(data);

            } catch (error) {
                console.error("Error fetching data:", error);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Error loading data: ${error.message}</td></tr>`;
            }
        }

        function updateStats(data) {
            document.getElementById('totalCheckins').textContent = data.length;
            const uniqueAgents = new Set(data.map(row => row.agent_id)).size;
            document.getElementById('uniqueAgents').textContent = uniqueAgents;
            const today = new Date().toDateString();
            const todayCount = data.filter(row => new Date(row.timestamp).toDateString() === today).length;
            document.getElementById('todayCheckins').textContent = todayCount;
        }

        function renderTable(data) {
            const tbody = document.getElementById('checkinTableBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                const photoUrl = row.photo_url ? supabase.storage.from('proofs').getPublicUrl(row.photo_url).data.publicUrl : null;
                const audioUrl = row.audio_url ? supabase.storage.from('proofs').getPublicUrl(row.audio_url).data.publicUrl : null;
                const dateStr = new Date(row.timestamp).toLocaleString();

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge bg-primary fs-6">#${row.agent_id}</span></td>
                    <td>${dateStr}</td>
                    <td>
                        <small class="text-muted d-block">Lat: ${row.latitude?.toFixed(4) || 'N/A'}</small>
                        <small class="text-muted">Lng: ${row.longitude?.toFixed(4) || 'N/A'}</small>
                    </td>
                    <td>
                        ${photoUrl ? `<img src="${photoUrl}" class="thumb-img" onclick="viewImage('${photoUrl}')" title="Click to enlarge">` : '<span class="text-muted">No photo</span>'}
                    </td>
                    <td>
                        ${audioUrl ? `<audio controls src="${audioUrl}"></audio>` : '<span class="text-muted">No audio</span>'}
                    </td>
                    <td>
                        <a href="https://www.google.com/maps?q=${row.latitude},${row.longitude}" target="_blank" class="btn btn-sm btn-outline-secondary" title="View in Google Maps">
                            <i class="bi bi-map"></i> Map
                        </a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderMap(data) {
            const bounds = L.latLngBounds();
            let hasValidCoords = false;

            data.forEach(row => {
                if (row.latitude && row.longitude) {
                    const marker = L.marker([row.latitude, row.longitude])
                        .addTo(map)
                        .bindPopup(`
                            <strong>Agent #${row.agent_id}</strong><br>
                            ${new Date(row.timestamp).toLocaleString()}<br>
                            <a href="https://www.google.com/maps?q=${row.latitude},${row.longitude}" target="_blank">View on Google Maps</a>
                        `);
                    markers.push(marker);
                    bounds.extend([row.latitude, row.longitude]);
                    hasValidCoords = true;
                }
            });

            if (hasValidCoords) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        function viewImage(url) {
            document.getElementById('modalImage').src = url;
            const modal = new bootstrap.Modal(document.getElementById('imageModal'));
            modal.show();
        }
    </script>
</body>
</html>
